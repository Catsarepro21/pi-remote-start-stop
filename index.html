<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA – Android / Chrome -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080808">

  <!-- PWA – iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Server">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/906/906341.png">

  <title>Home Server</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace; }
    .btn { transition: background-color 80ms, transform 80ms; }
    .btn:active { transform: scale(0.95); background-color: #181818; }
    @media (hover: hover) { .btn:hover { background-color: #161616; } }
  </style>
</head>

<body class="bg-[#080808] min-h-screen text-white select-none antialiased">

  <div class="max-w-xs mx-auto px-5 pt-12 pb-10 flex flex-col min-h-screen"
       style="padding-top: max(3rem, env(safe-area-inset-top, 3rem)); padding-bottom: max(2.5rem, env(safe-area-inset-bottom, 2.5rem));">

    <!-- Header -->
    <header class="flex items-start justify-between mb-9">
      <div>
        <p class="text-[9px] tracking-[0.35em] text-[#333] uppercase mb-0.5">Dashboard</p>
        <h1 class="text-[13px] font-semibold tracking-[0.2em] text-[#888] uppercase">Home Server</h1>
      </div>
      <div class="flex items-center gap-1.5 mt-1">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500" aria-label="System online" style="box-shadow: 0 0 6px #10b981aa;"></span>
        <span id="clock" class="text-[10px] tracking-widest text-[#333]">--:--</span>
      </div>
    </header>

    <!-- Button grid -->
    <main class="grid grid-cols-2 gap-2.5">

      <a href="http://home.local" target="_blank" rel="noopener noreferrer"
         class="btn flex flex-col items-center justify-center gap-3 bg-[#111] border border-[#1c1c1c] rounded-xl"
         style="aspect-ratio:1;">
        <i data-lucide="house" style="width:26px;height:26px;color:#6b6b6b;stroke-width:1.5;"></i>
        <span class="text-[9px] tracking-[0.3em] uppercase text-[#444]">Home</span>
      </a>

      <a href="http://pihole.local" target="_blank" rel="noopener noreferrer"
         class="btn flex flex-col items-center justify-center gap-3 bg-[#111] border border-[#1c1c1c] rounded-xl"
         style="aspect-ratio:1;">
        <i data-lucide="shield-check" style="width:26px;height:26px;color:#6b6b6b;stroke-width:1.5;"></i>
        <span class="text-[9px] tracking-[0.3em] uppercase text-[#444]">Pi-hole</span>
      </a>

      <a href="http://status.local" target="_blank" rel="noopener noreferrer"
         class="btn flex flex-col items-center justify-center gap-3 bg-[#111] border border-[#1c1c1c] rounded-xl"
         style="aspect-ratio:1;">
        <i data-lucide="activity" style="width:26px;height:26px;color:#6b6b6b;stroke-width:1.5;"></i>
        <span class="text-[9px] tracking-[0.3em] uppercase text-[#444]">Status</span>
      </a>

      <a href="http://logs.local" target="_blank" rel="noopener noreferrer"
         class="btn flex flex-col items-center justify-center gap-3 bg-[#111] border border-[#1c1c1c] rounded-xl"
         style="aspect-ratio:1;">
        <i data-lucide="scroll" style="width:26px;height:26px;color:#6b6b6b;stroke-width:1.5;"></i>
        <span class="text-[9px] tracking-[0.3em] uppercase text-[#444]">Logs</span>
      </a>

      <a href="http://prowlarr.local" target="_blank" rel="noopener noreferrer"
         class="btn flex flex-col items-center justify-center gap-3 bg-[#111] border border-[#1c1c1c] rounded-xl"
         style="aspect-ratio:1;">
        <i data-lucide="crosshair" style="width:26px;height:26px;color:#6b6b6b;stroke-width:1.5;"></i>
        <span class="text-[9px] tracking-[0.3em] uppercase text-[#444]">Prowlarr</span>
      </a>

      <!-- Opens the existing Pi Control (start/stop books) page -->
      <a href="./picontrol.html" target="_blank" rel="noopener noreferrer"
         class="btn flex flex-col items-center justify-center gap-3 bg-[#111] border border-[#1c1c1c] rounded-xl"
         style="aspect-ratio:1;">
        <i data-lucide="book-open" style="width:26px;height:26px;color:#6b6b6b;stroke-width:1.5;"></i>
        <span class="text-[9px] tracking-[0.3em] uppercase text-[#444]">Library</span>
      </a>

    </main>

    <!-- Footer -->
    <footer class="mt-auto pt-10 text-center">
      <p class="text-[9px] tracking-[0.3em] text-[#222] uppercase">v1.0</p>
    </footer>

  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    lucide.createIcons();

    function tick() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    tick();
    // Sync to the next full minute, then update every 60 s
    setTimeout(function syncClock() {
      tick();
      setInterval(tick, 60000);
    }, (60 - new Date().getSeconds()) * 1000);
  </script>

</body>
</html>
